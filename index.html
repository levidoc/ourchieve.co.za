<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourchieve - Premium Lifestyle Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#06080D', 800: '#0C0F16', 700: '#131820', 600: '#1A2030', 500: '#212840' },
                        accent: { DEFAULT: '#3B82F6', dark: '#2563EB', light: '#60A5FA', glow: '#1D4ED8' }
                    }
                }
            }
        }
    </script>
    <script src="http://demo-embedded.varsitymarket.tech/track/vm.analytics.js" data-store-id="5" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #06080D; color: #fff; min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #06080D; }
        ::-webkit-scrollbar-thumb { background: #1A2030; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3B82F6; }

        .glass { background: rgba(12,15,22,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glow-border { border: 1px solid rgba(59,130,246,0.12); transition: all 0.3s ease; }
        .glow-border:hover { border-color: rgba(59,130,246,0.4); box-shadow: 0 0 30px rgba(59,130,246,0.06); }

        .btn-primary { background: #3B82F6; color: #fff; font-weight: 700; transition: all 0.3s ease; }
        .btn-primary:hover { background: #60A5FA; box-shadow: 0 0 30px rgba(59,130,246,0.35); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-outline { border: 1px solid rgba(255,255,255,0.15); color: #fff; transition: all 0.3s ease; }
        .btn-outline:hover { border-color: #3B82F6; color: #3B82F6; }

        .product-img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover .product-img { transform: scale(1.05); }

        .slide-in { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-in.open { transform: translateX(0); }

        .text-gradient { background: linear-gradient(135deg, #fff 0%, #3B82F6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .hero-gradient { background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.1) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.06) 0%, transparent 50%); }

        .card-shine { position: relative; overflow: hidden; }
        .card-shine::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(59,130,246,0.04) 0%, transparent 60%); opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 1; }
        .card-shine:hover::before { opacity: 1; }

        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .loading-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes slide-announce { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .announce-slide { animation: slide-announce 25s linear infinite; }

        .qty-btn { transition: all 0.15s; }
        .qty-btn:active { transform: scale(0.9); }

        .page-enter { animation: fadeUp 0.4s ease forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .skeleton { background: linear-gradient(90deg, #131820 25%, #1A2030 50%, #131820 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #toast { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="antialiased">

    <!-- Announcement Bar -->
    <div class="bg-accent text-white text-xs font-semibold py-2 overflow-hidden">
        <div class="announce-slide whitespace-nowrap">
            FREE SHIPPING ON ORDERS OVER R750 &nbsp;&bull;&nbsp; NEW ARRIVALS DROPPING WEEKLY &nbsp;&bull;&nbsp; USE CODE "OURCHIEVE10" FOR 10% OFF &nbsp;&bull;&nbsp; PREMIUM QUALITY GUARANTEED &nbsp;&bull;&nbsp; FREE SHIPPING ON ORDERS OVER R750
        </div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="#" class="text-2xl font-black tracking-tighter">
                    <span class="text-white">OUR</span><span class="text-accent">CHIEVE</span>
                </a>

                <nav class="hidden md:flex items-center gap-8">
                    <a href="#shop" class="text-sm font-medium text-gray-300 hover:text-accent transition-colors">Shop</a>
                    <a href="#about" class="text-sm font-medium text-gray-300 hover:text-accent transition-colors">About</a>
                    <a href="#contact" class="text-sm font-medium text-gray-300 hover:text-accent transition-colors">Contact</a>
                </nav>

                <div class="flex items-center gap-3">
                    <button onclick="toggleSearch()" class="p-2.5 text-gray-400 hover:text-white transition-colors rounded-lg hover:bg-dark-600">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <button onclick="navigate('cart')" class="relative p-2.5 text-gray-400 hover:text-white transition-colors rounded-lg hover:bg-dark-600">
                        <i class="fa-solid fa-bag-shopping text-lg"></i>
                        <span id="cart-badge" class="absolute -top-0.5 -right-0.5 bg-accent text-white text-[10px] font-bold w-5 h-5 rounded-full items-center justify-center hidden">0</span>
                    </button>
                    <button onclick="toggleMobileMenu()" class="md:hidden p-2.5 text-gray-400 hover:text-white transition-colors rounded-lg hover:bg-dark-600">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div id="search-bar" class="hidden border-t border-white/5 bg-dark-800">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="search-input" onkeyup="handleSearch(event)" placeholder="Search products..." class="w-full bg-dark-700 border border-white/10 rounded-xl pl-12 pr-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-accent/50 transition-colors">
                </div>
                <div id="search-results" class="mt-3 hidden"></div>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80" onclick="toggleMobileMenu()"></div>
        <div class="absolute top-0 right-0 w-72 h-full bg-dark-800 border-l border-white/5 p-6">
            <div class="flex justify-end mb-8">
                <button onclick="toggleMobileMenu()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <nav class="flex flex-col gap-6">
                <a href="#shop" onclick="toggleMobileMenu()" class="text-lg font-medium text-gray-300 hover:text-accent transition-colors">Shop</a>
                <a href="#about" onclick="toggleMobileMenu()" class="text-lg font-medium text-gray-300 hover:text-accent transition-colors">About</a>
                <a href="#contact" onclick="toggleMobileMenu()" class="text-lg font-medium text-gray-300 hover:text-accent transition-colors">Contact</a>
                <a href="#cart" onclick="toggleMobileMenu()" class="text-lg font-medium text-gray-300 hover:text-accent transition-colors">Cart</a>
            </nav>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app"></div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-[90] translate-y-20 opacity-0 pointer-events-none">
        <div class="bg-dark-700 border border-accent/30 rounded-xl px-5 py-3.5 flex items-center gap-3 shadow-2xl">
            <i class="fa-solid fa-check-circle text-accent"></i>
            <span id="toast-msg" class="text-sm text-white font-medium">Done</span>
        </div>
    </div>

    <script>
    // ========================================
    // CONFIGURATION - Update these values
    // ========================================
    const CONFIG = {
        // API base URL (your store-access endpoint)
        API_BASE: 'https://demo-embedded.varsitymarket.tech/store-access',
        // Store ID from the admin panel
        STORE_ID: '5',
        // API Key generated from Developer Settings
        API_KEY: 'vm_live_6a3251c5acf6b130617899dbeaee9329259bec937181fbc4',
        // Store display info
        STORE_NAME: 'Ourchieve',
        CURRENCY: 'R',
        FREE_SHIPPING_THRESHOLD: 2000,
        SHIPPING_COST: 149
    };

    // ========================================
    // STATE
    // ========================================
    let state = {
        products: [],
        categories: [],
        cart: { cart_id: null, items: [], item_count: 0, subtotal: 0 },
        currentProduct: null,
        loading: false,
        storeInfo: null
    };

    // ========================================
    // API CLIENT
    // ========================================
    const api = {
        baseUrl() {
            return `${CONFIG.API_BASE}/${CONFIG.STORE_ID}/`;
        },

        headers() {
            return { 'Content-Type': 'application/json', 'X-API-Key': CONFIG.API_KEY };
        },

        async get(endpoint, params = {}) {
            const url = new URL(this.baseUrl(), window.location.origin);
            url.searchParams.set('state', endpoint);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            const res = await fetch(url.toString(), { headers: { 'X-API-Key': CONFIG.API_KEY } });
            return res.json();
        },

        async post(endpoint, body = {}) {
            const url = new URL(this.baseUrl(), window.location.origin);
            url.searchParams.set('state', endpoint);
            url.searchParams.set('api_key', CONFIG.API_KEY);
            const res = await fetch(url.toString(), {
                method: 'POST',
                headers: this.headers(),
                body: JSON.stringify(body)
            });
            return res.json();
        },

        async getProducts() { return this.get('products', { limit: '50' }); },
        async getProduct(id) { return this.get('product', { id }); },
        async getCategories() { return this.get('categories'); },
        async searchProducts(q) { return this.get('search', { q }); },
        async getSiteInfo() { return this.get('site'); },

        async createCart() { return this.post('cart_create'); },
        async getCart(cartId) { return this.get('cart', { cart_id: cartId }); },
        async addToCart(cartId, productId, quantity = 1) {
            return this.post('cart_add', { cart_id: cartId, product_id: productId, quantity });
        },
        async updateCart(cartId, productId, quantity) {
            return this.post('cart_update', { cart_id: cartId, product_id: productId, quantity });
        },
        async removeFromCart(cartId, productId) {
            return this.post('cart_remove', { cart_id: cartId, product_id: productId });
        },
        async createCheckout(cartId, returnUrl) {
            return this.post('checkout_create', { cart_id: cartId, return_url: returnUrl });
        },
        async completeCheckout(sessionId, customer) {
            return this.post('checkout_complete', { session_id: sessionId, ...customer });
        },
        async placeOrder(orderData) {
            return this.post('order', orderData);
        }
    };

    // ========================================
    // CART PERSISTENCE (localStorage for cart_id)
    // ========================================
    function getCartId() {
        return localStorage.getItem('ourchieve_cart_id');
    }
    function setCartId(id) {
        localStorage.setItem('ourchieve_cart_id', id);
    }

    async function ensureCart() {
        let cartId = getCartId();
        if (!cartId) {
            const res = await api.createCart();
            if (res.success) {
                cartId = res.data.cart_id;
                setCartId(cartId);
            }
        }
        state.cart.cart_id = cartId;
        return cartId;
    }

    async function refreshCart() {
        const cartId = await ensureCart();
        if (!cartId) return;
        try {
            const res = await api.getCart(cartId);
            if (res.success) {
                state.cart = { cart_id: cartId, ...res.data };
            } else if (res.error === 'Cart not found') {
                localStorage.removeItem('ourchieve_cart_id');
                await ensureCart();
            }
        } catch (e) {
            // Cart might not exist yet, that's ok
        }
        updateCartBadge();
    }

    async function addProductToCart(productId) {
        const cartId = await ensureCart();
        const res = await api.addToCart(cartId, productId, 1);
        if (res.success) {
            state.cart = { cart_id: cartId, ...res.data };
            updateCartBadge();
            showToast('Added to cart');
        } else {
            showToast(res.error || 'Failed to add');
        }
    }

    async function updateCartItem(productId, quantity) {
        const cartId = state.cart.cart_id;
        const res = await api.updateCart(cartId, productId, quantity);
        if (res.success) {
            state.cart = { cart_id: cartId, ...res.data };
            updateCartBadge();
            renderCurrentRoute();
        }
    }

    async function removeCartItem(productId) {
        const cartId = state.cart.cart_id;
        const res = await api.removeFromCart(cartId, productId);
        if (res.success) {
            state.cart = { cart_id: cartId, ...res.data };
            updateCartBadge();
            renderCurrentRoute();
        }
    }

    function updateCartBadge() {
        const badge = document.getElementById('cart-badge');
        const count = state.cart.item_count || 0;
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }

    // ========================================
    // ROUTER
    // ========================================
    function getRoute() {
        const hash = window.location.hash.slice(1) || '';
        const parts = hash.split('/');
        return { page: parts[0] || 'home', param: parts[1] || null };
    }

    function navigate(page, param) {
        if (param) {
            window.location.hash = `${page}/${param}`;
        } else {
            window.location.hash = page;
        }
    }

    async function renderCurrentRoute() {
        const { page, param } = getRoute();
        const app = document.getElementById('app');

        switch (page) {
            case 'home': case '':
                app.innerHTML = renderHomePage();
                break;
            case 'shop':
                app.innerHTML = renderLoading();
                await loadProducts();
                app.innerHTML = renderShopPage();
                break;
            case 'product':
                app.innerHTML = renderLoading();
                await loadProduct(param);
                app.innerHTML = renderProductPage();
                break;
            case 'cart':
                await refreshCart();
                app.innerHTML = renderCartPage();
                break;
            case 'checkout':
                app.innerHTML = renderCheckoutPage();
                break;
            case 'about':
                app.innerHTML = renderAboutPage();
                break;
            case 'contact':
                app.innerHTML = renderContactPage();
                break;
            case 'order-complete':
                app.innerHTML = renderOrderComplete(param);
                break;
            default:
                app.innerHTML = renderHomePage();
        }

        window.scrollTo(0, 0);
    }

    window.addEventListener('hashchange', renderCurrentRoute);

    // ========================================
    // DATA LOADING
    // ========================================
    async function loadProducts() {
        if (state.products.length > 0) return;
        try {
            const [prodRes, catRes] = await Promise.all([api.getProducts(), api.getCategories()]);
            if (prodRes.success) state.products = prodRes.data;
            if (catRes.success) state.categories = catRes.data;
        } catch (e) {
            state.products = [];
        }
    }

    async function loadProduct(id) {
        try {
            const res = await api.getProduct(id);
            if (res.success) state.currentProduct = res.data;
            else state.currentProduct = null;
        } catch (e) {
            state.currentProduct = null;
        }
    }

    // ========================================
    // RENDERERS
    // ========================================
    function renderLoading() {
        return `<div class="flex items-center justify-center py-32">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-accent loading-dot"></div>
                <div class="w-3 h-3 rounded-full bg-accent loading-dot"></div>
                <div class="w-3 h-3 rounded-full bg-accent loading-dot"></div>
            </div>
        </div>`;
    }

    function productImage(product) {
        if (product.image && product.image.startsWith('http')) return product.image;
        if (product.image) return product.image;
        return 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=80';
    }

    function renderHomePage() {
        return `<div class="page-enter">
            <!-- Hero -->
            <section class="relative min-h-[90vh] flex items-center hero-gradient overflow-hidden">
                <div class="absolute inset-0">
                    <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1920&q=80" alt="" class="w-full h-full object-cover opacity-15">
                </div>
                <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
                    <div class="max-w-3xl">
                        <p class="text-accent text-sm font-semibold tracking-widest uppercase mb-4">Premium Lifestyle Store</p>
                        <h1 class="text-5xl sm:text-6xl lg:text-8xl font-black leading-[0.9] mb-6">
                            <span class="text-white">DEFINE</span><br>
                            <span class="text-gradient">YOUR LEGACY</span>
                        </h1>
                        <p class="text-lg text-gray-400 max-w-lg mb-8">Premium lifestyle essentials crafted for those who refuse to blend in. Elevate your everyday with Ourchieve.</p>
                        <div class="flex flex-wrap gap-4">
                            <a href="#shop" class="btn-primary px-8 py-4 rounded-xl text-sm inline-flex items-center gap-2">SHOP NOW <i class="fa-solid fa-arrow-right"></i></a>
                            <a href="#about" class="btn-outline px-8 py-4 rounded-xl text-sm inline-flex items-center gap-2">OUR STORY</a>
                        </div>
                    </div>
                </div>
                <div class="absolute bottom-10 right-10 hidden lg:block">
                    <div class="glass glow-border rounded-2xl p-6 text-center">
                        <p class="text-3xl font-black text-accent">500+</p>
                        <p class="text-xs text-gray-400 mt-1">Happy Customers</p>
                    </div>
                </div>
            </section>

            <!-- Categories -->
            <section class="py-20 border-t border-white/5">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="text-center mb-12">
                        <p class="text-accent text-sm font-semibold tracking-widest uppercase mb-2">Browse</p>
                        <h2 class="text-3xl sm:text-4xl font-black text-white">Shop By Category</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div onclick="navigate('shop')" class="relative group rounded-2xl overflow-hidden h-52 cursor-pointer glow-border">
                            <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?w=600&q=80" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-dark-900/90 to-transparent"></div>
                            <div class="absolute bottom-6 left-6"><p class="text-white font-bold text-lg">Footwear</p></div>
                        </div>
                        <div onclick="navigate('shop')" class="relative group rounded-2xl overflow-hidden h-52 cursor-pointer glow-border">
                            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-dark-900/90 to-transparent"></div>
                            <div class="absolute bottom-6 left-6"><p class="text-white font-bold text-lg">Accessories</p></div>
                        </div>
                        <div onclick="navigate('shop')" class="relative group rounded-2xl overflow-hidden h-52 cursor-pointer glow-border">
                            <img src="https://images.unsplash.com/photo-1434389677669-e08b4cead0e2?w=600&q=80" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-dark-900/90 to-transparent"></div>
                            <div class="absolute bottom-6 left-6"><p class="text-white font-bold text-lg">Apparel</p></div>
                        </div>
                    </div>
                </div>
            </section>

            ${renderFooter()}
        </div>`;
    }

    function renderShopPage() {
        const productsHTML = state.products.length === 0
            ? `<div class="col-span-full text-center py-20"><i class="fa-solid fa-box-open text-4xl text-gray-700 mb-4"></i><p class="text-gray-500">No products available yet</p></div>`
            : state.products.map(p => renderProductCard(p)).join('');

        return `<div class="page-enter">
            <section class="py-12 sm:py-20">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex items-end justify-between mb-10">
                        <div>
                            <p class="text-accent text-sm font-semibold tracking-widest uppercase mb-2">Curated Selection</p>
                            <h2 class="text-3xl sm:text-4xl font-black text-white">All Products</h2>
                        </div>
                        <p class="text-gray-500 text-sm hidden sm:block">${state.products.length} products</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">${productsHTML}</div>
                </div>
            </section>
            ${renderFooter()}
        </div>`;
    }

    function renderProductCard(p) {
        return `<div class="product-card card-shine glow-border rounded-2xl overflow-hidden bg-dark-800 cursor-pointer group" onclick="navigate('product','${p.id}')">
            <div class="relative overflow-hidden bg-dark-700 h-64 flex items-center justify-center p-4">
                <img src="${productImage(p)}" alt="${esc(p.name)}" class="product-img w-full h-full object-contain">
                ${p.category_name ? `<span class="absolute top-3 left-3 bg-dark-900/80 backdrop-blur-sm text-xs text-gray-300 px-3 py-1 rounded-full">${esc(p.category_name)}</span>` : ''}
            </div>
            <div class="p-5">
                <h3 class="text-white font-bold text-sm mb-1 group-hover:text-accent transition-colors truncate">${esc(p.name)}</h3>
                <p class="text-gray-500 text-xs mb-3 line-clamp-1">${esc(p.description || '')}</p>
                <div class="flex items-center justify-between">
                    <p class="text-accent font-bold text-lg">${CONFIG.CURRENCY}${Number(p.price).toLocaleString()}</p>
                    <button onclick="event.stopPropagation(); addProductToCart(${p.id})" class="btn-primary px-4 py-2 rounded-lg text-xs flex items-center gap-1.5"><i class="fa-solid fa-plus"></i> Add</button>
                </div>
            </div>
        </div>`;
    }

    function renderProductPage() {
        const p = state.currentProduct;
        if (!p) return `<div class="text-center py-32"><i class="fa-solid fa-exclamation-circle text-4xl text-gray-600 mb-4"></i><p class="text-gray-400">Product not found</p><a href="#shop" class="text-accent text-sm mt-4 inline-block hover:underline">Back to Shop</a></div>`;

    async function handlePlaceOrder() {
        const btn = document.getElementById('place-order-btn');
        const errDiv = document.getElementById('checkout-error');
        errDiv.classList.add('hidden');

        const fname = document.getElementById('co-fname').value.trim();
        const lname = document.getElementById('co-lname').value.trim();
        const email = document.getElementById('co-email').value.trim();
        const phone = document.getElementById('co-phone').value.trim();
        const address = document.getElementById('co-address').value.trim();
        const city = document.getElementById('co-city').value.trim();
        const province = document.getElementById('co-province').value.trim();
        const postal = document.getElementById('co-postal').value.trim();

        if (!fname || !lname || !email || !phone || !address || !city) {
            errDiv.textContent = 'Please fill in all required fields.';
            errDiv.classList.remove('hidden');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processing...';

        const fullName = fname + ' ' + lname;
        const fullAddress = [address, city, province, postal].filter(Boolean).join(', ');

        try {
            // Use the direct order endpoint
            const orderData = {
                name: fullName,
                email: email,
                phone: phone,
                total: state.cart.subtotal + (state.cart.subtotal >= CONFIG.FREE_SHIPPING_THRESHOLD ? 0 : CONFIG.SHIPPING_COST),
                items: state.cart.items.map(i => ({ product_id: i.product_id, name: i.name, quantity: i.quantity, price: i.price }))
            };

            const res = await api.placeOrder(orderData);

            if (res.success) {
                // Clear local cart
                localStorage.removeItem('ourchieve_cart_id');
                state.cart = { cart_id: null, items: [], item_count: 0, subtotal: 0 };
                updateCartBadge();
                navigate('order-complete', '');
            } else {
                throw new Error(res.error || 'Order failed');
            }
        } catch (e) {
            errDiv.textContent = e.message || 'Something went wrong. Please try again.';
            errDiv.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = 'PLACE ORDER <i class="fa-solid fa-lock"></i>';
        }
    }

    let searchTimeout;
    function toggleSearch() {
        const bar = document.getElementById('search-bar');

    }

    function handleSearch(e) {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        const resultsDiv = document.getElementById('search-results');

        if (q.length < 2) { resultsDiv.classList.add('hidden'); return; }

        searchTimeout = setTimeout(async () => {
            const res = await api.searchProducts(q);
            if (res.success && res.data.length > 0) {
                resultsDiv.innerHTML = res.data.slice(0, 5).map(p => `
                    <a href="#product/${p.id}" onclick="toggleSearch()" class="flex items-center gap-3 p-3 rounded-lg hover:bg-dark-600 transition-colors">
                        <img src="${productImage(p)}" class="w-10 h-10 rounded-lg object-cover bg-dark-700">
                        <div class="flex-1 min-w-0"><p class="text-white text-sm font-medium truncate">${esc(p.name)}</p><p class="text-accent text-xs">${CONFIG.CURRENCY}${Number(p.price).toLocaleString()}</p></div>
                    </a>
                `).join('');
                resultsDiv.classList.remove('hidden');
            } else {
                resultsDiv.innerHTML = '<p class="text-gray-500 text-sm p-3">No results found</p>';
                resultsDiv.classList.remove('hidden');
            }
        }, 300);
    }

    // ========================================
    // UTILITIES
    // ========================================
    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    function toggleMobileMenu() {
        document.getElementById('mobile-menu').classList.toggle('hidden');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        t.style.transform = 'translateY(0)';
        t.style.opacity = '1';
        setTimeout(() => { t.style.transform = 'translateY(80px)'; t.style.opacity = '0'; }, 3000);
    }

    function handleContact(e) {
        e.preventDefault();
        showToast('Message sent! We\'ll respond within 24 hours.');
        e.target.reset();
    }

    function handleNewsletter(e) {
        e.preventDefault();
        showToast('Subscribed! Welcome to Ourchieve.');
        e.target.reset();
    }

    // ========================================
    // INIT
    // ========================================
    async function init() {
        await refreshCart();
        renderCurrentRoute();
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
